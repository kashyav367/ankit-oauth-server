<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Client Registration</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Inter', sans-serif;
  background: #050302;
}

/* 🔥 ORANGE CHAICODE BACKGROUND */
.bg-main {
  background:
    radial-gradient(circle at 20% 20%, rgba(255,140,0,0.15), transparent 35%),
    radial-gradient(circle at 80% 80%, rgba(255,180,0,0.12), transparent 35%),
    #050302;
}

/* 🔥 GLOW */
.glow {
  position:absolute;
  width:600px;
  height:600px;
  background: radial-gradient(circle, rgba(255,140,0,0.2), transparent);
  filter: blur(130px);
}

/* 🔥 GLASS */
.glass {
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow: 0 0 60px rgba(0,0,0,0.8);
}

/* 🔥 INPUT */
.input {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,140,0,0.25);
  color: #fff;
}
.input:focus {
  border-color: #f59e0b;
  box-shadow: 0 0 0 2px rgba(245,158,11,0.25);
}

/* 🔥 BUTTON */
.btn {
  background: linear-gradient(90deg,#f59e0b,#fbbf24);
  color: black;
  font-weight: 600;
}
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(245,158,11,0.4);
}

/* TEXT */
.text-primary { color: #f9fafb; }
.text-secondary { color: #9ca3af; }
.text-muted { color: #6b7280; }

.text-accent {
  background: linear-gradient(90deg,#f59e0b,#fbbf24);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* FEATURES */
.feature {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,140,0,0.2);
  transition: .3s;
}
.feature:hover {
  border-color: rgba(245,158,11,0.5);
  transform: translateY(-4px);
}
</style>
</head>

<body class="min-h-screen text-white flex items-center justify-center relative overflow-hidden">

<div class="absolute inset-0 bg-main"></div>
<div class="glow top-[-150px] left-[-120px]"></div>
<div class="glow bottom-[-150px] right-[-120px]"></div>

<!-- 🔥 BIGGER CONTAINER -->
<div class="relative grid lg:grid-cols-2 gap-20 max-w-7xl w-full px-6 z-10">

  <!-- LEFT -->
  <div class="space-y-12">

    <p class="text-accent text-xs tracking-[0.35em] font-semibold">
      AUTH PLATFORM
    </p>

    <h1 class="text-6xl font-extrabold leading-tight text-primary">
      Secure your app with <br>
      <span class="text-accent">modern authentication</span>
    </h1>

    <p class="text-secondary text-lg max-w-md">
      Generate credentials, plug them into your app, and enable secure login flows instantly.
    </p>

    <div class="grid grid-cols-3 gap-6 pt-6 text-sm">

      <div class="feature p-5 rounded-xl">
        🔐
        <p class="font-semibold mt-2 text-primary">Secure</p>
        <p class="text-muted text-xs mt-1">Encrypted keys</p>
      </div>

      <div class="feature p-5 rounded-xl">
        ⚡
        <p class="font-semibold mt-2 text-primary">Fast</p>
        <p class="text-muted text-xs mt-1">Instant setup</p>
      </div>

      <div class="feature p-5 rounded-xl">
        🔁
        <p class="font-semibold mt-2 text-primary">OAuth</p>
        <p class="text-muted text-xs mt-1">Code flow</p>
      </div>

    </div>
  </div>

  <!-- 🔥 RIGHT BIG FORM -->
  <div class="glass p-14 rounded-3xl w-full max-w-xl">

    <h2 class="text-3xl font-semibold mb-8 text-primary">
      Register Client
    </h2>

    <form id="client-form" class="space-y-6">

      <input name="applicationName" placeholder="Application name"
        class="input w-full p-4 rounded-xl outline-none text-base" required>

      <input name="contactEmail" placeholder="Contact email"
        class="input w-full p-4 rounded-xl outline-none text-base" required>

      <input name="applicationUrl" placeholder="Application URL"
        class="input w-full p-4 rounded-xl outline-none text-base" required>

      <input name="redirectUrl" placeholder="Redirect URL"
        class="input w-full p-4 rounded-xl outline-none text-base" required>

      <button class="btn w-full p-4 rounded-xl text-lg tracking-wide">
        Create Client →
      </button>

    </form>

    <div id="status" class="hidden mt-4 text-sm text-secondary"></div>

    <div id="result"
      class="hidden mt-6 p-4 rounded-xl bg-yellow-500/10 border border-yellow-400/30 text-secondary">
    </div>

  </div>

</div>


<script>
const form = document.getElementById("client-form");
const statusBox = document.getElementById("status");
const resultBox = document.getElementById("result");

const BASE_URL = "http://localhost:8000";

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  statusBox.classList.remove("hidden");
  statusBox.innerText = "Creating client...";

  const payload = {
    applicationName: form.applicationName.value,
    contactEmail: form.contactEmail.value,
    applicationUrl: form.applicationUrl.value,
    redirectUrl: form.redirectUrl.value
  };

  try {
    const res = await fetch(`${BASE_URL}/api/auth/client/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await res.json();
    if (!res.ok) throw new Error(data.message);

    statusBox.innerText = "Client created successfully ✅";

    resultBox.innerHTML = `
      <p><b>Client ID:</b> ${data.data.clientId}</p>
      <p><b>Client Secret:</b> ${data.data.clientSecret}</p>
    `;
    resultBox.classList.remove("hidden");

  } catch (err) {
    statusBox.innerText = err.message;
    statusBox.classList.add("text-red-400");
  }
});
</script>

</body>
</html>
