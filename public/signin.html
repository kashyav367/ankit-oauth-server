<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signin</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { font-family: 'Inter', sans-serif; background:#050302; }

/* 🔥 CHAI THEME */
.bg-main {
  background:
    radial-gradient(circle at 20% 20%, rgba(255,140,0,0.15), transparent 40%),
    radial-gradient(circle at 80% 80%, rgba(255,180,0,0.12), transparent 40%);
}

.glass {
  background: rgba(20,12,6,0.65);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
}

.input {
  background:#0c0703;
  border:1px solid rgba(255,140,0,0.25);
}
.input:focus {
  border-color:#f59e0b;
  box-shadow:0 0 0 2px rgba(245,158,11,0.25);
}

.btn {
  background: linear-gradient(90deg,#f59e0b,#fbbf24);
  color:black;
  font-weight:600;
}
</style>
</head>

<body class="min-h-screen text-white flex items-center justify-center">

<div class="absolute inset-0 bg-main"></div>

<main class="relative max-w-5xl w-full px-6">

<div class="grid lg:grid-cols-[1fr_1fr] rounded-3xl overflow-hidden shadow-2xl glass">

<!-- LEFT -->
<section class="p-10">

<p class="text-orange-400 text-xs tracking-widest">
AUTHORIZATION CODE
</p>

<h1 class="text-4xl font-bold mt-5 leading-tight">
Signin and return a code to your <span class="text-orange-300">client</span>
</h1>

<p class="text-gray-400 mt-4">
This page checks the user credentials and sends authorization code.
</p>

<div class="mt-8 grid grid-cols-2 gap-4 text-sm">
  <div class="p-4 rounded-xl border border-white/10 bg-black/40">
    <p class="font-semibold text-orange-300">No direct tokens</p>
    <p class="text-gray-400 text-xs mt-1">Returns only auth code</p>
  </div>

  <div class="p-4 rounded-xl border border-white/10 bg-black/40">
    <p class="font-semibold text-orange-300">Token exchange</p>
    <p class="text-gray-400 text-xs mt-1">Backend exchanges code</p>
  </div>
</div>

</section>

<!-- RIGHT -->
<section class="p-10 bg-black/70">

<!-- 🔥 FIXED CLIENT META -->
<div id="client-meta"
class="mb-6 p-4 rounded-xl bg-black/40 border border-orange-400/20 text-sm"></div>

<form id="signin-form" class="space-y-5">

<input id="email" value="john@example.com"
class="input w-full p-4 rounded-xl outline-none">

<input id="password" type="password" placeholder="Enter password"
class="input w-full p-4 rounded-xl outline-none">

<button class="btn w-full p-4 rounded-xl text-lg">
SIGNIN AND CONTINUE
</button>

</form>

<div id="status" class="mt-4 hidden text-sm"></div>

<p class="mt-6 text-sm text-gray-400">
Need an account?
<a id="signup-link" class="text-orange-400 underline">Go to signup</a>
</p>

</section>

</div>
</main>

<script>
const params = new URLSearchParams(window.location.search);
const clientId = params.get("client_id");
const redirectUri = params.get("redirect_uri");

const form = document.getElementById("signin-form");
const statusBox = document.getElementById("status");
const signupLink = document.getElementById("signup-link");
const clientMeta = document.getElementById("client-meta");

/* 🔥 FIX HERE */
if (clientId) {
  clientMeta.innerHTML = `
    <p><b>Client:</b> ${clientId}</p>
    <p><b>Redirect:</b> ${redirectUri || "default"}</p>
  `;
  signupLink.href = "/api/auth/signup" + window.location.search;
} else {
  clientMeta.innerHTML = `
    <p class="text-red-400 font-semibold">Missing client_id.</p>
    <p class="text-gray-400 mt-2">
      Open signin from a registered client link.
    </p>
  `;
  form.style.pointerEvents = "none";
  form.style.opacity = "0.5";
}

const setStatus = (msg, error=false) => {
  statusBox.classList.remove("hidden");
  statusBox.innerText = msg;
  statusBox.className = "mt-4 text-sm " + (error ? "text-red-400" : "text-green-400");
};

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  setStatus("Signing in...");

  const res = await fetch(window.location.pathname, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      email: form.email.value,
      password: form.password.value,
      clientId,
      redirectUri
    })
  });

  const data = await res.json();

  if (!res.ok) return setStatus(data.message, true);

  const redirectTo = data?.data?.redirectTo || data.redirectTo;

  window.location.href = redirectTo;
});
</script>

</body>
</html>
